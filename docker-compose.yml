services:
  mysql:
    image: mysql:8.4
    container_name: hrm-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - hrm_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  hrm-be:
    build:
      context: .
      dockerfile: Dockerfile.be
    container_name: hrm-be
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_TTL: ${JWT_TTL}
    volumes:
      - ./BE:/srv/app
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hrm_net

  hrm-fe:
    build:
      context: .
      dockerfile: Dockerfile.fe
      args:
        VITE_BE_API_BASE: /api/v1
    container_name: hrm-fe
    depends_on:
      - hrm-be
    restart: unless-stopped
    networks:
      - hrm_net

  hrm-proxy:
    image: caddy:2.8-alpine
    container_name: hrm-proxy
    depends_on:
      - hrm-be
      - hrm-fe
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./BE:/srv/app:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - hrm_net

networks:
  hrm_net:
    driver: bridge

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
